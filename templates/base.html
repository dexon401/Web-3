<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">

    <nav class="navbar bg-light">
        {% if current_user.is_authenticated %}
            <a class="navbar-brand navbar-text p-2" href="/logout">{{ current_user.name }}</a>
        {% else %}
            <p>
                <a class="btn btn-primary nav-item p-2" href="/register">Зарегистрироваться</a>
                <a class="btn btn-success nav-item p-2" href="/login">Войти</a>
            </p>
        {% endif %}
    </nav>
</head>
<body>
    <div class="container">
        <h1>Миссия Колонизация Марса</h1>
        <h4 id="gray-padding">И на Марсе будут яблони цвести!</h4>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
